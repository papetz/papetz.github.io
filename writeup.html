<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<title>Writeups</title>
</head>
<body>

<section>
  <div id="content"></div>
</section>

<script>
const file = window.location.hash.slice(1); // Remove the # prefix
console.log("URL:", window.location.href);
console.log("Hash:", window.location.hash);
console.log("File parameter:", file);

if (!file) {
  document.getElementById("content").innerHTML = "<p>No post specified.</p><p style='color: #666; font-size: 0.9em;'>URL: " + window.location.href + "</p><p style='color: #666; font-size: 0.9em;'>Hash: " + window.location.hash + "</p>";
} else {
  fetch("writeups/" + file + ".md")
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}: Could not load post`);
      return res.text();
    })
    .then(text => {
      document.getElementById("content").innerHTML = marked.parse(text);
      renderMathInElement(document.body);
    })
    .catch(err => {
      document.getElementById("content").innerHTML = "<p>Error loading post: " + err.message + "</p>";
      console.error(err);
    });
}
</script>

<script src="script.js"></script>
</body>
</html>
