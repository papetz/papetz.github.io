<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<title>Writeups</title>
</head>
<body>

<section>
  <div id="content"></div>
</section>

<script>
const params = new URLSearchParams(window.location.search);
const file = params.get("file");

if (!file) {
  document.getElementById("content").innerHTML = "<p>No post specified.</p>";
} else {
  fetch("posts/" + file + ".md")
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}: Could not load post`);
      return res.text();
    })
    .then(text => {
      document.getElementById("content").innerHTML = marked.parse(text);
      renderMathInElement(document.body);
    })
    .catch(err => {
      document.getElementById("content").innerHTML = "<p>Error loading post: " + err.message + "</p>";
      console.error(err);
    });
}
</script>

<script src="script.js"></script>
</body>
</html>
